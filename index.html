<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>もじもじそうち</title>
<meta name="description" content="ボールをころがして、もじブロックにあてて ことばをつくろう!ピタゴラそうちのように かべや かたちをじゆうにおいて あそべるよ。">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="もじもじそうち">
<meta property="og:description" content="ボールをころがして、もじブロックにあてて ことばをつくろう!つくったそうちは URLでシェアできるよ。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://taxpon.github.io/kitsutsuki/">
<meta property="og:image" content="https://taxpon.github.io/kitsutsuki/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toolbar">
  <div id="toolbar-scroll">
    <button id="btn-ball" class="action">⚪ ボールをころがす</button>
    <button id="btn-auto" class="action">🔁 れんぞく</button>
    <div class="sep"></div>
    <button class="tool active" data-mode="select">✋ うごかす</button>
    <button class="tool" data-mode="letter">あ もじ</button>
    <button class="tool" data-mode="wall">📏 かべ</button>
    <button class="tool" data-mode="circle">⚫ まる</button>
    <button class="tool" data-mode="triangle">🔺 さんかく</button>
    <button class="tool" data-mode="erase">🧽 けす</button>
    <div class="sep"></div>
    <button id="btn-clear" class="action danger">🗑 ぜんぶけす</button>
    <button id="btn-share" class="action">🔗 シェア</button>
    <span id="hint"></span>
  </div>
  <div id="toolbar-more">›</div>
</div>
<div id="kana-panel" class="hidden">
  <div id="kana-tabs">
    <button id="tab-hira" class="active">ひらがな</button>
    <button id="tab-kata">カタカナ</button>
  </div>
  <div id="kana-grid"></div>
</div>
<canvas id="stage"></canvas>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script src="sounds-data.js"></script>
<script src="main.js"></script>
</body>
</html>
